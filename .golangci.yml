# golangci-lint v2 configuration (pinned to v2.x in CI). The default set
# (errcheck, govet, ineffassign, staticcheck, unused) is enabled implicitly;
# the extras below are added on top.
version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - misspell
    - revive
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
